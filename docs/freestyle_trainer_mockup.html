<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreestyleTrainer — Mockup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 0.4rem;
    }

    .metric-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }

    .metric-val {
      font-size: 1.75rem;
      font-weight: 600;
      line-height: 1.1;
      color: #ffffff;
    }

    .block-card {
      background: #141414;
      border: 1px solid #252525;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }

    .beat-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1f1f1f;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: #888;
      font-weight: 500;
    }

    .beat-dot.active {
      background: #534AB7;
      border-color: #534AB7;
      color: #fff;
    }

    .rhyme-chip {
      display: inline-block;
      background: #1f1f1f;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 0.35rem 0.85rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: #e8e8e8;
    }

    .ending-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #0d2240;
      color: #7ab8f5;
      font-size: 0.78rem;
      border-radius: 6px;
      padding: 3px 10px;
      margin-top: 5px;
    }

    .divider {
      border-top: 1px solid #222;
      margin: 0.75rem 0;
    }

    .beat-name {
      font-size: 1rem;
      font-weight: 500;
      color: #f0f0f0;
    }

    .rhyme-hint {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>

  <p class="section-label mb-3">FreestyleTrainer</p>

  <!-- Bloque 1: Ritmo -->
  <div class="block-card">
    <p class="section-label">Ritmo</p>
    <div class="row g-2 mb-3">
      <div class="col-4">
        <div class="metric-card">
          <div class="section-label">BPM</div>
          <div class="metric-val">80</div>
        </div>
      </div>
      <div class="col-4">
        <div class="metric-card">
          <div class="section-label">Beats / barra</div>
          <div class="metric-val">4</div>
        </div>
      </div>
      <div class="col-4">
        <div class="metric-card">
          <div class="section-label">Barra actual</div>
          <div class="metric-val">2</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <p class="section-label">Posición en el compás</p>
    <div class="d-flex align-items-center gap-2">
      <div class="beat-dot active">1</div>
      <div class="beat-dot">2</div>
      <div class="beat-dot">3</div>
      <div class="beat-dot">4</div>
      <span class="ms-2" style="font-size:0.78rem; color:#555;">barra 2</span>
    </div>
  </div>

  <!-- Bloque 2: Pista -->
  <div class="block-card">
    <p class="section-label">Pista</p>
    <div class="beat-name">Zharovbeatz melodic type beat</div>
    <div class="ending-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h10M4 17h6"/></svg>
      ending_id: 17
    </div>
    <div class="rhyme-hint">Terminación activa: <strong style="color:#aaa;">mo, no</strong></div>
  </div>

  <!-- Bloque 3: Palabras -->
  <div class="block-card">
    <p class="section-label">Palabras para rimar</p>
    <div class="d-flex flex-wrap gap-2 mt-1">
      <span class="rhyme-chip">ritmo</span>
      <span class="rhyme-chip">verano</span>
      <span class="rhyme-chip">hermano</span>
      <span class="rhyme-chip">mismo</span>
    </div>
  </div>

</body>
</html>
